allowBuilds:
  '@joshuafolkken/game-kit': true
  '@joshuafolkken/kit': true
  esbuild: true
  lefthook: true
  unrs-resolver: true
  sharp: true
  workerd: true

# Security fixes often require same-day vite releases; minimum-release-age in .npmrc would block them.
# @joshuafolkken/* packages are first-party — the supply-chain age policy is overkill for self-published utility packages.
minimumReleaseAgeExclude:
  - vite
  - '@joshuafolkken/kit'
  - '@joshuafolkken/game-kit'

overrides:
  cookie: ^0.7.0
  serialize-javascript: '>=7.0.5'
  ws: '>=8.20.1'
