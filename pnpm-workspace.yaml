allowBuilds:
  '@joshuafolkken/game-kit': true
  '@joshuafolkken/kit': true
  esbuild: true
  lefthook: true
  unrs-resolver: true
  sharp: true
  workerd: true

# Security fixes often require same-day vite releases; minimum-release-age in .npmrc would block them.
# @joshuafolkken/* packages are first-party — the supply-chain age policy is overkill for self-published utility packages.
minimumReleaseAgeExclude:
  - vite
  - '@joshuafolkken/kit'
  - '@joshuafolkken/game-kit'

overrides:
  cookie: ^0.7.0
  serialize-javascript: '>=7.0.5'
  ws: '>=8.20.1'

# pnpm >=11.5 re-verifies every lockfile entry against the registry at install time.
# On clean CI without a usable token for private @joshuafolkken/* GitHub Packages this
# fails (ERR_PNPM_TARBALL_URL_MISMATCH). trustLockfile skips that install-time re-check
# for the already-committed lockfile; minimum-release-age still applies at resolution time.
trustLockfile: true
