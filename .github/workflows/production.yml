name: Release to Production
on:
  repository_dispatch:
    types: [new-tag-created]

jobs:
  update-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update production branch
        env:
          # repository_dispatch always runs on the default branch, so the event ref
          # resolves to that branch, not the released tag. Use the tag carried in the
          # dispatch payload (set by auto-tag.yml) as the merge source instead.
          REF_NAME: ${{ github.event.client_payload.tag }}
        run: |
          if [ -z "$REF_NAME" ]; then
            echo "::error::new-tag-created dispatch carried no tag payload; aborting." >&2
            exit 1
          fi

          if ! [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $REF_NAME" >&2
            exit 1
          fi

          git fetch origin --tags
          if ! git rev-parse -q --verify "refs/tags/$REF_NAME" >/dev/null; then
            echo "::error::Tag not found: $REF_NAME" >&2
            exit 1
          fi
          git checkout production || git checkout -b production origin/production || git checkout -b production

          git merge "refs/tags/$REF_NAME" --no-ff -m "Release $REF_NAME"
          git push origin production
