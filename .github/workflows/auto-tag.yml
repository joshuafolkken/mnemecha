name: Auto Tag on Version Change

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  create-tag:
    name: Create Git Tag if Version Changed
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if version changed
        id: version_check
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          if git show HEAD~1:package.json > /dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD~1:package.json | jq -r '.version')
            echo "Previous version: $PREV_VERSION"
            echo "Current version: $CURRENT_VERSION"

            if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "✅ Version changed from $PREV_VERSION to $CURRENT_VERSION"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Version unchanged: $CURRENT_VERSION"
            fi
          else
            # first commit
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "ℹ️ First commit, creating tag"
          fi

      - name: Wait for CI to pass on this commit
        id: ci_gate
        if: steps.version_check.outputs.changed == 'true'
        env:
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in $(seq 1 18); do
            result=$(gh run list --workflow ci.yml --repo "$GITHUB_REPOSITORY" \
              --json headSha,conclusion,status \
              --jq "[.[] | select(.headSha == \"$SHA\")] | .[0] | .conclusion // .status // \"none\"" 2>/dev/null || echo "none")
            case "$result" in
              success)
                echo "passed=true" >> $GITHUB_OUTPUT
                echo "✅ CI passed, proceeding with tag creation"
                exit 0
                ;;
              failure | cancelled | timed_out)
                echo "passed=false" >> $GITHUB_OUTPUT
                echo "⚠️ CI $result on this commit, skipping tag creation"
                exit 0
                ;;
            esac
            echo "CI status: $result (attempt $attempt/18)"
            sleep 10
          done
          echo "passed=false" >> $GITHUB_OUTPUT
          echo "⏱️ Timed out waiting for CI"

      - name: Check if tag already exists
        id: tag_check
        if: steps.version_check.outputs.changed == 'true' && steps.ci_gate.outputs.passed == 'true'
        env:
          VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag $TAG already exists, skipping tag creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist, will create it"
          fi

      - name: Create and push tag
        id: create_tag
        if: steps.version_check.outputs.changed == 'true' && steps.ci_gate.outputs.passed == 'true' && steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          TAG="v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release version $VERSION"
          git push origin "$TAG"

          echo "✅ Created and pushed tag: $TAG"
          echo "completed=true" >> $GITHUB_OUTPUT

      - name: Trigger next workflow
        if: steps.create_tag.outputs.completed == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          event-type: new-tag-created
